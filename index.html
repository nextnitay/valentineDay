@keyframes pulse {

  }
  50% {

  }

/* MENU DATE – BENAR2 DISEMBUNYIKAN */
.dates {

}

.date-box {

  align-items: flex-end; /* text di bawah */
  justify-content: center;
  width: 150px;  /* sesuaikan */
  height: 180px; /* total tinggi box */
  background-color: #000; /* fallback */
  border-radius: 10px;
  overflow: hidden; /* agar gambar tidak keluar box */
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.date-box img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%; /* gambar full memenuhi box */
  
  z-index: 1;
}

.date-box span {
  position: absolute;
  bottom: 0;
  /* left: 0; */
  z-index: 2; /* agar text di atas gambar */
    width: 100%;
  height: 80%; /* gambar full memenuhi box */
  /* padding: 8px 5px; */
  object-fit: cover;
  text-align: center;
  font-weight: 500;
  color: white;
  background: linear-gradient(to top, rgba(0,0,0,30), rgba(0,0,0,0)); /* hitam ke transparan */
  /* border-radius: 0 0 10px 10px; */
}

.date-box:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.text-overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%; /* sama dengan overlay */
  display: flex;
  align-items: flex-end;  /* vertical: bawah */
  justify-content: center; /* horizontal: center */

  color: white;
  font-weight: 500;
  z-index: 2;
  text-align: center;
}


.no-clicked {

  color: white;
  box-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
}

.date-box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}
.fade-text {

.fade-in { opacity: 1 !important; } 
.fade-out { opacity: 0 !important; }

const rect = noBtn.getBoundingClientRect();

let currentX = rect.left; // jarak dari kiri viewport
let currentY = rect.top;  // jarak dari atas viewport


function isOutOfViewport(x, y, w, h) {
  return (
    x < 0 ||
    y < 0 ||
    x + w > window.innerWidth ||
    y + h > window.innerHeight
  );
}

function isTooClose(x, y, w, h) {
  return (
    Math.abs(x - currentX) < w ||
    Math.abs(y - currentY) < h ||
    Math.abs(x - currentX) > 2*w ||
    Math.abs(y - currentY) > 2*h
  );
}


function getValidPosition(w, h) {
  let x, y;
  let tries = 0;
  const MAX_TRIES = 100;

  do {
    x = Math.random() * (window.innerWidth - w);
    y = Math.random() * (window.innerHeight - h);
    tries++;
  } while (
    (isOutOfViewport(x, y, w, h) ||
     isTooClose(x, y, w, h)) &&
    tries < MAX_TRIES
  );

  currentX = x;
  currentY = y;

  return { x, y };
}

noBtn.addEventListener("mouseenter", () => {

  const { x, y } = getValidPosition(

    noBtn.classList.remove("no-clicked");
  }, 200);

  noBtn.style.top = `${y}px`;
});
